<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Inline SVG favicon (data URI) — no network request, so no /favicon.ico 404. -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%237c6f64'/%3E%3Cpath d='M9 8.5h8.5a4 4 0 0 1 4 4V24a3 3 0 0 0-3-3H9z' fill='none' stroke='%23fff' stroke-width='1.8' stroke-linejoin='round'/%3E%3Cpath d='M23 8.5h-2.2a3 3 0 0 0-3 3V21' fill='none' stroke='%23fff' stroke-width='1.8' stroke-linejoin='round' opacity='.55'/%3E%3C/svg%3E"
    />
    <title>sayumi</title>
    <!-- Preload the two interface typefaces (served by the Go binary) to cut
         first-paint FOUT/CLS for the serif wordmark and UI text. -->
    <link
      rel="preload"
      href="/fonts/Literata-VariableFont.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/AtkinsonHyperlegibleNext-VariableFont.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <!-- Pre-paint theme bootstrap: apply the last-used theme's cached tokens
         before the app (and its server settings) load, so a reload doesn't
         flash the default light theme. Inline element styles override app.css
         :root defaults; no-ops safely when storage is empty/blocked. This is
         the app shell, not the sandboxed reader iframe — its CSP is untouched. -->
    <script>
      (function () {
        try {
          var v = JSON.parse(localStorage.getItem("sayumi:theme-vars") || "null");
          if (!v) return;
          var s = document.documentElement.style;
          s.setProperty("--bg", v.bg);
          s.setProperty("--fg", v.fg);
          s.setProperty("--accent", v.accent);
          s.setProperty("--accent-fg", v.accentFg);
          s.colorScheme = v.scheme;
          if (v.id) document.documentElement.dataset.theme = v.id;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
