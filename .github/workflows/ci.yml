name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same ref instead of paying for stale CI.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, test & build
    runs-on: ubuntu-latest
    env:
      # Force cgo so check.sh runs `go test -race` (and FAILS on data races)
      # instead of silently downgrading to a plain `go test`.
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.x"
          cache: true

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      # Build the SPA first: cmd/sayumi/main.go has `//go:embed dist`, so the Go
      # gates inside check.sh (go vet, golangci-lint, go test) fail on a clean
      # checkout unless cmd/sayumi/dist already exists.
      - name: Build frontend (populate //go:embed dist dir)
        working-directory: frontend
        run: bun run build

      # Pinned tool versions so check.sh actually RUNS the format/lint/vuln gates.
      # check.sh skips any tool that is not on PATH, so without this the lint and
      # govulncheck gates would silently pass on a clean CI runner.
      - name: Install Go quality tools (pinned)
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          go install mvdan.cc/gofumpt@v0.10.0
          go install golang.org/x/tools/cmd/goimports@v0.46.0

      - name: Run checks
        run: ./check.sh
