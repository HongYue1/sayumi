name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Supersede stale PR/branch runs, but never cancel a run on the default branch
# so every commit that lands on main/master gets a complete CI pass.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

jobs:
  check:
    name: Lint, test & build
    runs-on: ubuntu-latest
    env:
      # Force cgo so check.sh runs `go test -race` (and FAILS on data races)
      # instead of silently downgrading to a plain `go test`.
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      # Build the SPA first: cmd/sayumi/main.go has `//go:embed dist`, so the Go
      # gates inside check.sh (go vet, golangci-lint, go test) fail on a clean
      # checkout unless cmd/sayumi/dist already exists.
      - name: Build frontend (populate //go:embed dist dir)
        working-directory: frontend
        run: bun run build

      # Pinned tool versions so check.sh actually RUNS the format/lint/vuln gates.
      # check.sh skips any tool that is not on PATH, so without this the lint and
      # govulncheck gates would silently pass on a clean CI runner.
      - name: Install Go quality tools (pinned)
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          go install mvdan.cc/gofumpt@v0.10.0
          go install golang.org/x/tools/cmd/goimports@v0.46.0

      - name: Run checks
        run: ./check.sh
