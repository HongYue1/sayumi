name: Release

# Cross-compiles portable binaries for every target and attaches them to a
# GitHub Release when a v* tag is pushed. Quality gates (./check.sh) run FIRST
# so a tag can never publish artifacts that fail tests, lint, or govulncheck.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Minimal by default; the release job opts into write access explicitly.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write # create the GitHub Release and upload assets
      id-token: write # OIDC token Sigstore uses to sign the provenance attestation
      attestations: write # upload the provenance attestation to the attestations API
    env:
      # Force cgo so the gate step runs `go test -race` (see ci.yml).
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # tags, for `git describe`

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      # Build the SPA before check.sh: its Go gates rely on cmd/sayumi/dist
      # (//go:embed dist) existing. release.sh rebuilds it for the real artifacts.
      - name: Build frontend (populate //go:embed dist dir)
        working-directory: frontend
        run: bun run build

      - name: Install Go quality tools (pinned)
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          go install mvdan.cc/gofumpt@v0.10.0
          go install golang.org/x/tools/cmd/goimports@v0.46.0

      # Gate the release: tests (race), formatting, go vet, golangci-lint,
      # govulncheck, svelte-check, and a build all must pass before publishing.
      - name: Quality gates (test, lint, govulncheck)
        run: ./check.sh

      - name: Install go-winres
        run: go install github.com/tc-hib/go-winres@v0.3.3

      - name: Build release artifacts
        run: ./release.sh

      # Sign SLSA build provenance for each published archive (not SHA256SUMS).
      # Needs the id-token + attestations permissions granted on this job above.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "dist-release/sayumi-*"

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          fail_on_unmatched_files: true # never publish an empty/partial release
          files: |
            dist-release/sayumi-*
            dist-release/SHA256SUMS
