# Keeps the supply chain current despite SHA-pinning:
# Dependabot bumps the pinned action SHAs (and the trailing version comment)
# and the Go module dependencies on a weekly cadence.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: build
